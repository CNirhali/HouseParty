<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HousePartyApp</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>District</h1>
        </header>

        <!-- Feed Screen -->
        <div id="feed-screen" class="screen active">
            <div class="vibe-filters" id="vibe-filters">
                <!-- Filters will be generated by JS -->
            </div>
            <div class="party-list" id="party-list">
                <!-- Parties will be generated by JS -->
            </div>
        </div>

        <!-- Detail Screen -->
        <div id="detail-screen" class="screen">
            <div class="detail-header">
                <button id="back-btn" class="back-btn">← Back</button>
                <h2 id="detail-title">Party Title</h2>
            </div>
            <div class="hero-image">
                🎉
            </div>
            <div class="detail-content">
                <div class="vibe-badge" id="detail-vibe">Vibe</div>
                <div class="detail-row">
                    <span>📅</span> <span id="detail-date">Date Time</span>
                </div>
                <div class="detail-row">
                    <span>📍</span> <span id="detail-location">Secret Location (Hidden)</span>
                </div>
                <div class="detail-row">
                    <span>👥</span> <span id="detail-guests">0/50 Guests</span>
                </div>

                <button id="book-btn" class="book-btn">Request to Join (Digital Doorbell)</button>
                <div id="success-msg" class="success-msg hidden">
                    ✅ You are on the guest list! Address revealed.
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
